<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard</title>
    <meta name="description" content="Personal life metrics dashboard — mood, sleep, productivity, health tracking">
    <link rel="icon" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" id="app">
        <!-- Single Top Header Row -->
        <div class="top-header-row">
            <!-- 1. Branding & Greeting -->
            <div class="header-branding">
                <div class="header-logo-row">
                    <span class="logo"><span class="logo-accent">Life</span> Dashboard</span>
                    <span class="sync-dot" id="syncDot" title="Sync Status"></span>
                </div>
                <h1 class="greeting" id="greeting">—</h1>
            </div>

            <!-- 2. Tabs Column -->
            <nav class="tabs" id="tabs">
                <button class="tab active" data-tab="dashboard">Обзор</button>
                <button class="tab" data-tab="devops">Инфраструктура</button>
                <button class="tab" data-tab="analytics">Аналитика</button>
                <button class="tab" data-tab="librechat">LibreChat</button>
                <button class="tab" data-tab="guacamole">Guacamole</button>
                <button class="tab" data-tab="omniroute">OmniRoute</button>
            </nav>

            <!-- 3. Weather Block -->
            <div class="top-widget weather-widget-pane" id="weatherWidget">
                <div class="weather-current-row">
                    <span class="weather-icon" id="weatherIcon"></span>
                    <div class="weather-temp-col">
                        <span class="weather-temp" id="weatherTemp">—</span>
                        <span class="weather-desc" id="weatherDesc"></span>
                    </div>
                    <div class="weather-metrics">
                        <div class="wm-item" title="Влажность"><span class="wm-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg></span> <span id="weatherHum">—</span></div>
                        <div class="wm-item" title="Ветер"><span class="wm-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 1.79 4.25H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg></span> <span id="weatherWind">—</span></div>
                        <div class="wm-item" title="Ощущается как"><span class="wm-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg></span> <span id="weatherFeels">—</span></div>
                        <div class="wm-item" title="Атм. давление"><span class="wm-icon"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg></span> <span id="weatherPressure">—</span></div>
                    </div>
                    
                    <div class="weather-quote" id="weatherQuote">—</div>

                    <!-- Moved back to top row -->
                    <div class="weather-sun-col">
                        <div class="ws-item"><span class="ws-icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg></span> <span id="weatherSunrise">—</span></div>
                        <div class="ws-item"><span class="ws-icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg></span> <span id="weatherSunset">—</span></div>
                    </div>
                </div>
                <!-- Hourly combined -->
                <div class="weather-hourly-wrap">
                    <div class="weather-hourly" id="weatherHourly"></div>
                </div>
            </div>

            <!-- 4. Schedule Block -->
            <div class="top-widget schedule-widget-pane">
                <div class="date-big-display" id="dateDisplay">—</div>
                <div id="liveSchedule" class="top-live-schedule"></div>
            </div>
        </div>

        <!-- Tab: Dashboard -->
        <main class="tab-content active" id="tab-dashboard">
            <section id="hero" class="hero2"></section>
            <section id="liveStrip" class="live"></section>
            <section id="domains" class="domains"></section>

            <!-- Stat Cards + Heatmap Row -->
            <!--
            <section class="stats-heatmap-row">
                <div class="stats-column" id="statCards"></div>
                <div class="chart-card heatmap-card heatmap-inline" id="heatmapCard" style="--i: 2">
                    <div class="chart-header">
                        <h2>История настроения</h2>
                        <button class="header-add-btn" id="quickAddBtn" title="Быстрый ввод">+</button>
                    </div>
                    <div id="moodHeatmap" class="heatmap-container"></div>
                </div>
            </section>
            -->

            <!-- Charts Row -->
            <section class="charts-row">
                <div class="chart-card" id="trendChartCard" style="--i: 0">
                    <div class="chart-header">
                        <h2>Тренды</h2>
                        <div class="period-selector" id="periodSelector">
                            <button class="period-btn" data-days="7">7д</button>
                            <button class="period-btn active" data-days="30">30д</button>
                            <button class="period-btn" data-days="90">90д</button>
                        </div>
                    </div>
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="chart-card" id="timeBreakdownCard" style="--i: 1">
                    <div class="chart-header">
                        <h2>Время за неделю</h2>
                    </div>
                    <canvas id="timeChart"></canvas>
                    <div id="timeSummary" class="time-summary"></div>
                </div>
            </section>
        </main>

        <!-- Tab: Infrastructure -->
        <main class="tab-content" id="tab-devops">
            <!-- Sub-tab switcher -->
            <div class="sub-tabs" id="devopsSubTabs">
                <button class="sub-tab active" data-subtab="agents">🤖 Агенты</button>
                <button class="sub-tab" data-subtab="resources">📊 Ресурсы</button>
            </div>

            <!-- Sub-tab: Agents -->
            <div class="sub-tab-content active" id="subtab-agents">
                <div id="agentRooms"></div>
            </div>

            <!-- Sub-tab: Resources -->
            <div class="sub-tab-content" id="subtab-resources">
                <div id="serverMetrics"></div>
            </div>
        </main>

        <!-- Tab: Health Analytics -->
        <main class="tab-content" id="tab-analytics">
            <div class="charts-row" style="margin-bottom: var(--gap);">
                <div class="chart-card" style="--i: 0">
                    <div class="chart-header">
                        <h2>Стресс и Энергия (Body Battery)</h2>
                    </div>
                    <canvas id="stressChart" style="max-height: 220px;"></canvas>
                </div>
                <div class="chart-card" style="--i: 0.5">
                    <div class="chart-header">
                        <h2>Пульс (Сердцебиение)</h2>
                    </div>
                    <canvas id="hrChart" style="max-height: 220px;"></canvas>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card" style="--i: 1">
                    <div class="chart-header">
                        <h2>Кислород в крови (SpO2)</h2>
                    </div>
                    <canvas id="spo2Chart" style="max-height: 220px;"></canvas>
                </div>
                <div class="chart-card" style="--i: 1.5">
                    <div class="chart-header">
                        <h2>Сожженные Калории</h2>
                    </div>
                    <canvas id="caloriesChart" style="max-height: 220px;"></canvas>
                </div>
            </div>
        </main>

        <!-- Embedded Apps Tabs -->
        <main class="tab-content app-iframe-tab" id="tab-librechat">
            <iframe src="https://chat.gigglin.tech/" class="app-iframe" allow="microphone; camera; clipboard-read; clipboard-write"></iframe>
        </main>

        <main class="tab-content app-iframe-tab" id="tab-guacamole">
            <iframe src="https://rdp.gigglin.tech/" class="app-iframe" allow="clipboard-read; clipboard-write"></iframe>
        </main>

        <main class="tab-content app-iframe-tab" id="tab-omniroute">
            <iframe src="https://omniroute.gigglin.tech/" class="app-iframe"></iframe>
        </main>
    <!-- QuickEntry Modal -->
    <div class="modal-overlay" id="quickEntryOverlay">
        <div class="modal-content quick-entry-modal">
            <div class="modal-header">
                <h2 class="modal-title">Быстрый ввод</h2>
                <span class="modal-date" id="qeModalDate"></span>
                <button class="modal-close" id="qeModalClose">&times;</button>
            </div>
            <div id="quickEntry" class="quick-entry"></div>
        </div>
    </div>

    <!-- Schedule Editor Modal -->
    <div class="modal-overlay" id="scheduleEditorOverlay">
        <div class="modal-content schedule-editor-modal">
            <div class="modal-header">
                <button class="sched-nav-btn" id="schedPrev">&lt;</button>
                <h2 class="modal-title" id="schedDateTitle">—</h2>
                <button class="sched-nav-btn" id="schedNext">&gt;</button>
                <button class="modal-close" id="schedModalClose">&times;</button>
            </div>
            <div id="scheduleEditorBody"></div>
            <div class="modal-footer">
                <button class="modal-save-btn" id="schedSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
