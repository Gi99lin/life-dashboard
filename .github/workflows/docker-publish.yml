name: Publish Docker images

on:
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # Приводим имя пользователя к нижнему регистру для совместимости с Docker
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Важно: дает права на загрузку в GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image prefix
        run: |
          echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> ${GITHUB_ENV}

      - name: Build images
        run: |
          docker build -t "${IMAGE_PREFIX}/life-dashboard-frontend:latest" ./dashboard
          docker build -t "${IMAGE_PREFIX}/life-dashboard-api:latest" ./api
          docker build -t "${IMAGE_PREFIX}/life-dashboard-collector:latest" ./collector

      - name: Smoke test images
        run: |
          docker run --rm --add-host life-dashboard-api:127.0.0.1 \
            --entrypoint nginx "${IMAGE_PREFIX}/life-dashboard-frontend:latest" -t
          docker run --rm --entrypoint node "${IMAGE_PREFIX}/life-dashboard-api:latest" \
            --input-type=module -e "await import('./server.js'); setTimeout(() => process.exit(0), 100)"
          docker run --rm --entrypoint sh "${IMAGE_PREFIX}/life-dashboard-collector:latest" \
            -c 'test -x /entrypoint.sh && python3 -m compileall -q /app'

      - name: Push images
        run: |
          docker push "${IMAGE_PREFIX}/life-dashboard-frontend:latest"
          docker push "${IMAGE_PREFIX}/life-dashboard-api:latest"
          docker push "${IMAGE_PREFIX}/life-dashboard-collector:latest"
